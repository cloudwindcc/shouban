<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手办生成器 - 管理后台</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>手办生成器管理后台</h1>
            <nav>
                <a href="index.html">返回主页</a>
            </nav>
        </header>

        <main class="admin-main">
            <div class="config-section">
                <h2>API配置</h2>
                <div class="config-form">
                    <div class="form-group">
                        <label for="apiKey">Gemini API Key:</label>
                        <input type="password" id="apiKey" placeholder="输入你的Gemini API Key">
                        <button type="button" id="toggleApiKey" class="toggle-btn">显示</button>
                    </div>
                    
                    <div class="form-group">
                        <label for="model">模型选择:</label>
                        <select id="model">
                            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                            <option value="gemini-1.0-pro">Gemini 1.0 Pro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="defaultPrompt">默认提示词:</label>
                        <textarea id="defaultPrompt" rows="4" placeholder="输入默认的生成提示词..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button id="loadConfig" class="btn btn-secondary">加载当前配置</button>
                        <button id="saveConfig" class="btn btn-primary">保存配置</button>
                    </div>
                </div>
            </div>

            <div class="status-section">
                <h2>系统状态</h2>
                <div class="status-grid">
                    <div class="status-item">
                        <h3>API状态</h3>
                        <div id="apiStatus" class="status-indicator">未检查</div>
                    </div>
                    <div class="status-item">
                        <h3>配置状态</h3>
                        <div id="configStatus" class="status-indicator">未加载</div>
                    </div>
                </div>
                <button id="testApi" class="btn btn-secondary">测试API连接</button>
            </div>

            <div class="presets-section">
                <h2>提示词预设</h2>
                <div class="presets-grid">
                    <div class="preset-item">
                        <h4>可爱风格</h4>
                        <p>生成超可爱的Q版手办风格，大眼睛，圆润造型，色彩鲜艳</p>
                        <button class="btn btn-small" onclick="setPrompt('生成超可爱的Q版手办风格，大眼睛，圆润造型，色彩鲜艳，保持角色特征')">使用</button>
                    </div>
                    <div class="preset-item">
                        <h4>精致风格</h4>
                        <p>高品质手办风格，精细细节，专业涂装，收藏级品质</p>
                        <button class="btn btn-small" onclick="setPrompt('高品质手办风格，精细细节，专业涂装，收藏级品质，完美比例，高端制作工艺')">使用</button>
                    </div>
                    <div class="preset-item">
                        <h4>动漫风格</h4>
                        <p>经典动漫手办风格，还原动画角色，生动表情</p>
                        <button class="btn btn-small" onclick="setPrompt('经典动漫手办风格，还原动画角色，生动表情，动态姿势，忠实原作设定')">使用</button>
                    </div>
                    <div class="preset-item">
                        <h4>写实风格</h4>
                        <p>写实风格手办，真实质感，细腻纹理，逼真效果</p>
                        <button class="btn btn-small" onclick="setPrompt('写实风格手办，真实质感，细腻纹理，逼真效果，高度还原，专业级制作')">使用</button>
                    </div>
                </div>
            </div>
        </main>

        <div class="notification" id="notification" style="display: none;"></div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
